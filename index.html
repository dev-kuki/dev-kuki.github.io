  <div id="content-area" style="opacity:0;transition:opacity .28s,transform .28s"></div>

<!-- VOD OVERLAY -->
<div class="vod-overlay" id="vod-player-overlay">
  <div class="vod-box">
    <div class="vod-frame" id="vod-player-frame"></div>
    <div style="margin-top:12px;text-align:center">
      <button class="btn btn-ghost" onclick="closeVodPlayer()">close</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <h3>delete</h3>
    <p id="delete-modal-text">enter your pin to confirm</p>
    <input type="password" id="pin-input" placeholder="••••••" maxlength="12"
      oninput="document.getElementById('pin-error').textContent=''">
    <div class="modal-error" id="pin-error"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost"  onclick="closeModal()">cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete()">delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- floating music player -->
<div class="music-bar">
  <button class="mc" onclick="prevTrack()" title="prev">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
  </button>
  <button class="mc play" id="music-play-btn" onclick="toggleMusic()" title="play/pause">
    <svg id="music-play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
  </button>
  <button class="mc" onclick="nextTrack()" title="next">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
  </button>
  <div class="music-name" id="music-track-name">no tracks</div>
  <div class="music-prog" id="music-progress-bar" onclick="seekMusic(event)">
    <div class="music-prog-fill" id="music-progress-fill"></div>
  </div>
</div>

<!--
  SCRIPT LOAD ORDER MATTERS:
  1. bg.js      — canvas animation
  2. supabase.js — db functions (defines syncViewCount, initCounter, etc.)
  3. music.js   — player
  4. routine.js — timer functions
  5. tabs.js    — TABS object (must be before app.js)
  6. app.js     — switchTab() uses TABS, runs init last
-->
<script src="js/bg.js"></script>
<script src="js/supabase.js"></script>
<script src="js/music.js"></script>
<script src="js/routine.js"></script>
<script src="js/tabs.js"></script>
<script src="js/app.js"></script>

</body>
